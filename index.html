<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>Marine Life Smart Finder</title>

    <style>
        /* 모바일 전체 화면 및 바다 테마 스타일 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #011627 0%, #0b2545 100%);
            color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            width: 100%;
            padding: 15px 0 5px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(1, 22, 39, 1), rgba(1, 22, 39, 0.8));
            z-index: 10;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
        }

        p {
            font-size: 0.8rem;
            color: #b0e0e6;
            margin: 3px 0 0 0;
            letter-spacing: 0.5px;
        }

        /* 상태 표시창: 바다 파도 느낌의 에메랄드 스타일 */
        #status {
            font-weight: bold;
            background: rgba(0, 242, 254, 0.15);
            color: #00f2fe;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid rgba(0, 242, 254, 0.4);
            margin: 8px auto;
            backdrop-filter: blur(8px);
            display: inline-block;
            transition: all 0.3s ease;
        }

        /* 📱 모바일 카메라 컨테이너: 심해 잠수경 컨셉 보더 */
        #canvas-container {
            position: relative;
            width: 92%;
            max-width: 450px;
            aspect-ratio: 3 / 4;
            background: #020c1b;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, -1, 25, 0.7);
            border: 3px solid #00b4d8;
        }

        video { display: none; }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

        <div id="status">⏳ 해양 추론 엔진 로드 중...</div>
    </header>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="display_canvas"></canvas>
    </div>
